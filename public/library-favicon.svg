<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b21a8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  
  <!-- Books stack -->
  <g transform="translate(6, 8)">
    <!-- Bottom book -->
    <rect x="0" y="10" width="20" height="3" fill="#ffffff" opacity="0.9" rx="0.5"/>
    <rect x="0" y="10" width="12" height="3" fill="#e9d5ff" opacity="0.8" rx="0.5"/>
    
    <!-- Middle book -->
    <rect x="1" y="6" width="18" height="3" fill="#ffffff" opacity="0.95" rx="0.5"/>
    <rect x="1" y="6" width="10" height="3" fill="#f3e8ff" opacity="0.7" rx="0.5"/>
    
    <!-- Top book -->
    <rect x="2" y="2" width="16" height="3" fill="#ffffff" rx="0.5"/>
    <rect x="2" y="2" width="8" height="3" fill="#faf5ff" opacity="0.6" rx="0.5"/>
    
    <!-- Book spines details -->
    <line x1="0" y1="10" x2="0" y2="13" stroke="#9333ea" stroke-width="0.5" opacity="0.5"/>
    <line x1="1" y1="6" x2="1" y2="9" stroke="#9333ea" stroke-width="0.5" opacity="0.5"/>
    <line x1="2" y1="2" x2="2" y2="5" stroke="#9333ea" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- Small highlight -->
  <ellipse cx="12" cy="10" rx="3" ry="1" fill="#ffffff" opacity="0.3"/>
</svg>
